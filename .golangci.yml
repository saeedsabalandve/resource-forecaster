# # golangci-lint configuration for production-grade code quality
# # https://golangci-lint.run/usage/configuration/

run:
  timeout: 10m
  tests: true
  skip-dirs:
    - vendor
    - third_party
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*\\.gen\\.go$"
  modules-download-mode: readonly
  allow-parallel-runners: true
  go: '1.21'

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (*database/sql.Rows).Close
      - (*database/sql.Tx).Rollback

  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow

  gocyclo:
    min-complexity: 15

  gocognit:
    min-complexity: 25

  dupl:
    threshold: 100

  goconst:
    min-len: 3
    min-occurrences: 5

  misspell:
    locale: US
    ignore-words:
      - someword

  lll:
    line-length: 140
    tab-width: 4

  unused:
    check-exported: true

  unparam:
    check-exported: true

  nakedret:
    max-func-lines: 30

  prealloc:
    simple: true
    range-loops: true
    for-loops: true

  nolintlint:
    allow-unused: false
    require-explanation: true
    require-specific: true

  gosec:
    includes:
      - G101 # # Hardcoded credentials
      - G102 # # Bind to all interfaces
      - G103 # # Use of unsafe block
      - G104 # # Errors not checked
      - G106 # # SSH InsecureIgnoreHostKey
      - G107 # # URL provided to HTTP request as taint input
      - G108 # # Profiling endpoint exposed
      - G109 # # Integer overflow
      - G110 # # Decompression bomb
      - G201 # # SQL injection
      - G202 # # SQL string formatting
      - G301 # # Poor file permissions
      - G302 # # Poor file permissions with chmod
      - G401 # # Weak crypto
      - G402 # # TLS InsecureSkipVerify
      - G403 # # Weak random number generation
      - G404 # # Weak random number generation
      - G501 # # Blocklisted import crypto/md5
      - G502 # # Blocklisted import crypto/des
      - G503 # # Blocklisted import crypto/rc4
      - G504 # # Blocklisted import net/http/cgi
      - G505 # # Blocklisted import crypto/sha1

  revive:
    severity: warning
    confidence: 0.8
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc
    settings:
      hugeParam:
        sizeThreshold: 256

  cyclop:
    max-complexity: 15
    skip-tests: true

linters:
  enable-all: true
  disable:
    - exhaustivestruct
    - exhaustruct
    - forbidigo
    - funlen
    - gci
    - gochecknoglobals
    - gochecknoinits
    - godot
    - godox
    - goerr113
    - gomnd
    - nestif
    - nlreturn
    - nonamedreturns
    - paralleltest
    - tagliatelle
    - testpackage
    - thelper
    - varnamelen
    - wrapcheck
    - wsl
    - ireturn
    - depguard
    - tagalign
    - musttag

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - dupl
        - gosec
        - gocyclo
        - gocognit
        - lll
        - scopelint
        - unparam

    - path: internal/mocks/
      linters:
        - errcheck
        - gosec

    - linters:
        - lll
      source: "^//go:generate "

  max-issues-per-linter: 0
  max-same-issues: 0
  fix: false
  new: false
  new-from-rev: HEAD~1

severity:
  default-severity: error
  case-sensitive: true
  rules:
    - linters:
        - dupl
      severity: info
