apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: resource-forecaster-hpa
  namespace: monitoring
  labels:
    app: resource-forecaster
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: resource-forecaster
  
  # Scaling boundaries for production
  minReplicas: 3
  maxReplicas: 20
  
  # Advanced metrics-based autoscaling
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  
  # Custom metrics from Prometheus
  - type: Pods
    pods:
      metric:
        name: forecast_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  
  - type: Object
    object:
      metric:
        name: timescaledb_active_connections
      describedObject:
        apiVersion: v1
        kind: Service
        name: timescaledb
      target:
        type: Value
        value: "80"
  
  # Scaling behavior configuration
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
      selectPolicy: Min
