apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: resource-forecaster
  namespace: monitoring
  labels:
    app: resource-forecaster
    release: prometheus
    monitoring: enabled
spec:
  selector:
    matchLabels:
      app: resource-forecaster
  namespaceSelector:
    matchNames:
    - monitoring
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    scheme: http
    
    # # Relabeling for better metric identification
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_pod_node_name]
      targetLabel: node
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
    
    # # Metric relabeling to drop high-cardinality labels
    metricRelabelings:
    - sourceLabels: [__name__]
      regex: 'go_gc_.*'
      action: drop
    - sourceLabels: [instance]
      action: replace
      targetLabel: instance
      replacement: '${1}'
